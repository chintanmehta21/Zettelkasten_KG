version: rubric_rerank.v1
formula: "0.5*NDCG@5 + 0.3*P@3 + 0.2*(1 - FP@3)"
gold_source: "docs/rag_eval/_config/queries/<source>/seed.yaml :: gold_ranking"
ndcg:
  k: 5
  description: "Normalized DCG over gold_ranking, computed against reranked[:5]."
  weight: 0.5
precision:
  k: 3
  description: "Fraction of reranked[:3] that are in the gold set."
  weight: 0.3
false_positive_rate:
  k: 3
  description: "1 - precision@3 (penalty term)."
  weight: 0.2
