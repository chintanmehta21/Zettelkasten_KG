name: Keep Render Alive

on:
  schedule:
    # Ping every 14 minutes (GitHub cron minimum is 5 min, but may drift)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -sf --max-time 60 "${{ secrets.RENDER_URL }}" || echo "Ping failed, service may be starting"
