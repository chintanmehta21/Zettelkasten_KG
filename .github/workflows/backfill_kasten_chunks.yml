name: Backfill Kasten Chunks (one-shot)

on:
  workflow_dispatch:
    inputs:
      sandbox_id:
        description: "Kasten sandbox UUID to backfill"
        required: true
        type: string
      limit:
        description: "Max nodes to process"
        required: false
        default: "50"
        type: string
      dry_run:
        description: "Dry run (no writes)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: backfill-kasten-chunks-${{ inputs.sandbox_id }}
  cancel-in-progress: false

jobs:
  backfill:
    name: Backfill chunks for sandbox ${{ inputs.sandbox_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ops/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements.txt
      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          ARGS="--kasten ${{ inputs.sandbox_id }} --limit ${{ inputs.limit }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python ops/scripts/backfill_chunks.py $ARGS
