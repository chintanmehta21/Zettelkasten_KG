name: Apply user_pricing schema to Supabase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run psql in --single-transaction with explain only"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  apply-schema:
    name: psql -f supabase/website/user_pricing/schema.sql
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout schema file
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            supabase/website/user_pricing/schema.sql
          sparse-checkout-cone-mode: false

      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Apply schema (idempotent — `create ... if not exists`)
        env:
          PGPASSWORD_DUMMY: "kept-secret-via-conn-string"
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret missing in production environment"
            exit 1
          fi
          set -e
          echo "Applying supabase/website/user_pricing/schema.sql ..."
          psql "$SUPABASE_DB_URL" \
            --single-transaction \
            --set ON_ERROR_STOP=1 \
            -v ON_ERROR_STOP=1 \
            -f supabase/website/user_pricing/schema.sql
          echo "[ok] user_pricing schema applied"
