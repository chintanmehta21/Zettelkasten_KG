name: KG Intelligence Tests

on:
  pull_request:
    paths:
      - 'website/features/kg_features/**'
      - 'website/core/supabase_kg/**'
      - 'supabase/website/kg_features/**'
      - 'tests/kg_intelligence/**'
      - 'ops/requirements.txt'
      - '.github/workflows/kg-intelligence-tests.yml'
  push:
    branches: [master]
    paths:
      - 'website/features/kg_features/**'
      - 'website/core/supabase_kg/**'
      - 'supabase/website/kg_features/**'
      - 'tests/kg_intelligence/**'
      - 'ops/requirements.txt'
      - '.github/workflows/kg-intelligence-tests.yml'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'ops/requirements.txt'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements.txt
      - name: Run KG intelligence tests
        run: python -m pytest tests/kg_intelligence/ -v --tb=short
