name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target_hostname:
        description: "Caddy hostname to deploy (zettelkasten.in or stage.zettelkasten.in)"
        required: false
        default: "zettelkasten.in"

concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: pytest (mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ops/requirements.txt
            ops/requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements-dev.txt
      - name: pytest
        env:
          TELEGRAM_BOT_TOKEN: "000:ci-stub"
          ALLOWED_CHAT_ID: "1"
          GEMINI_API_KEY: "ci-stub"
        run: pytest -q --maxfail=5

  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/chintanmehta21/zettelkasten-kg-website:${{ github.sha }}
            ghcr.io/chintanmehta21/zettelkasten-kg-website:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: SSH deploy to droplet
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      # Build the container .env body by iterating EVERY production
      # environment secret via toJSON(secrets). This eliminates the old
      # anti-pattern of 3 hardcoded key lists (new_envs.txt, sync script,
      # and this workflow) drifting apart — adding a new secret is now a
      # one-line edit in new_envs.txt + rerun of set_github_secrets.sh.
      #
      # BLOCKLIST: secrets consumed by the workflow itself (SSH, docker
      #            login, or GH's built-in GITHUB_TOKEN) that must NOT
      #            be written to the app's .env.
      # RENAME_MAP: GH secret name -> container env var name. Needed
      #            because GH reserves the GITHUB_ prefix, so production
      #            uses GH_*_FOR_NOTES which must remap to GITHUB_TOKEN /
      #            GITHUB_REPO at deploy time.
      - name: Build container .env body from environment secrets
        id: env
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          TARGET_HOST: ${{ inputs.target_hostname || 'zettelkasten.in' }}
        run: |
          set -euo pipefail

          BLOCKLIST='["DROPLET_HOST","DROPLET_SSH_USER","DROPLET_SSH_PORT","DROPLET_SSH_KEY","GHCR_READ_PAT","GITHUB_TOKEN"]'
          RENAME_MAP='{"GH_TOKEN_FOR_NOTES":"GITHUB_TOKEN","GH_REPO_FOR_NOTES":"GITHUB_REPO"}'

          SECRETS_BODY=$(printf '%s' "$SECRETS_JSON" | jq -r \
            --argjson blocklist "$BLOCKLIST" \
            --argjson rename "$RENAME_MAP" '
            to_entries
            | map(select(.key as $k | ($blocklist | index($k)) | not))
            | map(.key = ($rename[.key] // .key))
            | map(select(.value != null and .value != ""))
            | sort_by(.key)
            | map("\(.key)=\(.value)")
            | .[]
          ')

          STATIC_BODY=$(printf '%s\n' \
            "WEBHOOK_MODE=true" \
            "WEBHOOK_PORT=10000" \
            "WEBHOOK_URL=https://${TARGET_HOST}" \
            "NEXUS_ENABLED=true")

          FULL_ENV="${SECRETS_BODY}"$'\n'"${STATIC_BODY}"

          {
            echo "env_body<<ENV_BODY_EOF"
            printf '%s\n' "$FULL_ENV"
            echo "ENV_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          secret_count=$(printf '%s\n' "$SECRETS_BODY" | grep -c '=' || true)
          echo "Built .env with ${secret_count} secret line(s) + 4 static line(s)"

      # Checkout ops/ so we can SCP deploy scripts + compose files to the
      # droplet. This keeps the droplet's scripts in sync with the repo
      # on every deploy — no manual provisioning needed.
      - name: Checkout ops
        uses: actions/checkout@v4
        with:
          sparse-checkout: ops
          sparse-checkout-cone-mode: true

      # Upload deploy scripts + compose files to /tmp on the droplet.
      # The deploy user has write access to /tmp; the next SSH step
      # installs them to /opt/zettelkasten/ via whitelisted sudo commands.
      - name: Upload infrastructure files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          source: "ops/deploy/deploy.sh,ops/deploy/reload_caddy.sh,ops/deploy/healthcheck.sh,ops/deploy/rollback.sh,ops/docker-compose.caddy.yml,ops/docker-compose.blue.yml,ops/docker-compose.green.yml"
          target: "/tmp/zk-sync"
          overwrite: true

      - name: Sync files, write .env, and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          envs: ENV_BODY,GHCR_READ_PAT,SHA
          command_timeout: 8m
          script: |
            set -euo pipefail

            # ── 1. Sync deploy scripts (tee + chmod are sudoers-whitelisted) ──
            for f in deploy.sh reload_caddy.sh healthcheck.sh rollback.sh; do
              src="/tmp/zk-sync/ops/deploy/$f"
              dst="/opt/zettelkasten/deploy/$f"
              if [ -f "$src" ]; then
                sudo /usr/bin/tee "$dst" < "$src" > /dev/null
                sudo /usr/bin/chmod 755 "$dst"
              fi
            done
            echo "[sync] Deploy scripts updated"

            # ── 2. Sync compose files ──
            for f in docker-compose.caddy.yml docker-compose.blue.yml docker-compose.green.yml; do
              src="/tmp/zk-sync/ops/$f"
              dst="/opt/zettelkasten/compose/$f"
              if [ -f "$src" ]; then
                sudo /usr/bin/tee "$dst" < "$src" > /dev/null
                sudo /usr/bin/chmod 644 "$dst"
              fi
            done
            echo "[sync] Compose files updated"

            rm -rf /tmp/zk-sync

            # ── 3. Ensure Caddy container matches current compose ──
            # Picks up init:true, image updates, config changes, etc.
            # --no-deps avoids touching blue/green app containers.
            docker compose -f /opt/zettelkasten/compose/docker-compose.caddy.yml up -d --no-deps 2>&1 || true
            echo "[sync] Caddy container reconciled"

            # ── 4. Docker login + write .env ──
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u chintanmehta21 --password-stdin

            printf '%s\n' "$ENV_BODY" | sudo /usr/bin/tee /opt/zettelkasten/compose/.env > /dev/null
            sudo /usr/bin/chmod 600 /opt/zettelkasten/compose/.env
            sudo /usr/bin/chown deploy:deploy /opt/zettelkasten/compose/.env

            # ── 5. Run deploy with one retry ──
            for attempt in 1 2; do
              if sudo /opt/zettelkasten/deploy/deploy.sh "$SHA"; then
                exit 0
              fi

              if [ "$attempt" -lt 2 ]; then
                echo "Deploy attempt ${attempt} failed; retrying once after rollback..."
                sleep 5
              fi
            done

            exit 1
        env:
          ENV_BODY: ${{ steps.env.outputs.env_body }}
          GHCR_READ_PAT: ${{ secrets.GHCR_READ_PAT }}
          SHA: ${{ github.sha }}
