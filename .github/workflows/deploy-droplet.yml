name: Deploy to DigitalOcean Droplet

# Canonical production target:
#   - DigitalOcean Premium Intel droplet (2 GB RAM, 1 vCPU, 70 GB NVMe SSD)
#   - Reserved IP attached (stable across droplet lifecycle events)
#   - Cloudflare DNS for apex zettelkasten.in
#   - Caddy 2 container terminates TLS (Let's Encrypt) and proxies to the active color
#   - Blue/green Docker Compose: blue=127.0.0.1:10000, green=127.0.0.1:10001
#   - Image registry: ghcr.io/chintanmehta21/zettelkasten-kg-website:<git-sha>
#   - Cutover script on droplet: /opt/zettelkasten/deploy/deploy.sh <git-sha>

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target_hostname:
        description: "Caddy hostname to deploy (zettelkasten.in or stage.zettelkasten.in)"
        required: false
        default: "zettelkasten.in"

concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: pytest (mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ops/requirements.txt
            ops/requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements-dev.txt
      - name: pytest
        env:
          GEMINI_API_KEY: "ci-stub"
        run: pytest -q --maxfail=5

  # iter-03 §1C.5: schema-drift freshness gate. Spins a throwaway Postgres,
  # applies every committed migration, then asks apply_migrations to compare
  # the resulting live schema against supabase/website/kg_public/expected_schema.json.
  # Drift here means a migration was added without updating the manifest —
  # block the deploy so the operator either edits the manifest or fixes the
  # migration.
  migrations-manifest-check:
    name: Schema-drift manifest freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ops/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements.txt
          pip install 'psycopg[binary]'
      - name: Apply migrations + verify manifest
        env:
          SUPABASE_DB_URL: postgresql://postgres:testpass@localhost:5432/postgres
        run: |
          # Skip the gate if the manifest hasn't been bootstrapped yet —
          # the first commit that adds expected_schema.json arms the gate.
          if [ ! -f supabase/website/kg_public/expected_schema.json ]; then
            echo "[manifest-check] expected_schema.json not present yet; skipping."
            exit 0
          fi
          python ops/scripts/apply_migrations.py
          python ops/scripts/apply_migrations.py --check-manifest-fresh

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/chintanmehta21/zettelkasten-kg-website:${{ github.sha }}
            ghcr.io/chintanmehta21/zettelkasten-kg-website:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: SSH deploy to droplet
    needs: [test, build-and-push]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      # Build the container .env body by iterating EVERY production
      # environment secret via toJSON(secrets). This eliminates the old
      # anti-pattern of 3 hardcoded key lists (new_envs.txt, sync script,
      # and this workflow) drifting apart — adding a new secret is now a
      # one-line edit in new_envs.txt + rerun of set_github_secrets.sh.
      #
      # BLOCKLIST: secrets consumed by the workflow itself (SSH, docker
      #            login, or GH's built-in GITHUB_TOKEN) that must NOT
      #            be written to the app's .env.
      # RENAME_MAP: GH secret name -> container env var name. Needed
      #            because GH reserves the GITHUB_ prefix, so production
      #            uses GH_*_FOR_NOTES which must remap to GITHUB_TOKEN /
      #            GITHUB_REPO at deploy time.
      - name: Checkout deploy scripts
        uses: actions/checkout@v5
        with:
          sparse-checkout: ops/deploy
          sparse-checkout-cone-mode: true

      - name: Sync deploy scripts to droplet
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          source: "ops/deploy/*.sh"
          target: "/opt/zettelkasten/deploy/"
          strip_components: 2  # ops/deploy/ -> /opt/zettelkasten/deploy/

      - name: Build container .env body from environment secrets
        id: env
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          TARGET_HOST: ${{ inputs.target_hostname || 'zettelkasten.in' }}
          DEPLOY_GIT_SHA: ${{ github.sha }}
          DEPLOY_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          DEPLOY_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          BLOCKLIST='["DROPLET_HOST","DROPLET_SSH_USER","DROPLET_SSH_PORT","DROPLET_SSH_KEY","GHCR_READ_PAT","GITHUB_TOKEN"]'
          RENAME_MAP='{"GH_TOKEN_FOR_NOTES":"GITHUB_TOKEN","GH_REPO_FOR_NOTES":"GITHUB_REPO"}'

          SECRETS_BODY=$(printf '%s' "$SECRETS_JSON" | jq -r \
            --argjson blocklist "$BLOCKLIST" \
            --argjson rename "$RENAME_MAP" '
            to_entries
            | map(select(.key as $k | ($blocklist | index($k)) | not))
            | map(.key = ($rename[.key] // .key))
            | map(select(.value != null and .value != ""))
            | sort_by(.key)
            | map("\(.key)=\(.value)")
            | .[]
          ')

          # REDDIT_OPTIONAL=1 opts out of the fail-fast Reddit OAuth gate in
          # website/core/settings.py:validate_reddit_credentials. Until
          # REDDIT_CLIENT_ID / REDDIT_CLIENT_SECRET are registered as GH
          # Actions secrets, this flag prevents the container from aborting
          # at startup when WEBHOOK_SECRET is set. If the static value is
          # already defined via a secret with the same name, toJSON(secrets)
          # will take precedence since STATIC_BODY is concatenated after
          # SECRETS_BODY — set the secret to override.
          # iter-03 §1C.4: ship deploy provenance through the .env file the
          # droplet sudoers ALREADY whitelists for tee. apply_migrations.py
          # picks these up from container env (--env-file). deploy.sh extracts
          # only DEPLOY_* lines (no full source — secrets stay scoped to the
          # docker --env-file path, never the host shell).
          STATIC_BODY=$(printf '%s\n' \
            "WEBHOOK_MODE=true" \
            "WEBHOOK_PORT=10000" \
            "WEBHOOK_URL=https://${TARGET_HOST}" \
            "NEXUS_ENABLED=true" \
            "REDDIT_OPTIONAL=1" \
            "DEPLOY_GIT_SHA=${DEPLOY_GIT_SHA}" \
            "DEPLOY_ID=${DEPLOY_ID}" \
            "DEPLOY_ACTOR=${DEPLOY_ACTOR}" \
            "GUNICORN_WORKERS=1" \
            "GUNICORN_TIMEOUT=180" \
            "GUNICORN_GRACEFUL_TIMEOUT=90")

          FULL_ENV="${SECRETS_BODY}"$'\n'"${STATIC_BODY}"

          {
            echo "env_body<<ENV_BODY_EOF"
            printf '%s\n' "$FULL_ENV"
            echo "ENV_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          secret_count=$(printf '%s\n' "$SECRETS_BODY" | grep -c '=' || true)
          echo "Built .env with ${secret_count} secret line(s) + 4 static line(s)"

      - name: Write .env, reconcile Caddy, and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          # iter-03 §1C.4: forward deploy provenance into deploy.sh so the
          # migration audit row records who/what/which-deploy applied it.
          envs: ENV_BODY,GHCR_READ_PAT,SHA
          command_timeout: 8m
          script: |
            set -euo pipefail

            # ── 1. Docker login ──
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u chintanmehta21 --password-stdin

            # ── 2. Write .env (tee/chmod/chown whitelisted in sudoers) ──
            printf '%s\n' "$ENV_BODY" | sudo /usr/bin/tee /opt/zettelkasten/compose/.env > /dev/null
            sudo /usr/bin/chmod 600 /opt/zettelkasten/compose/.env
            sudo /usr/bin/chown deploy:deploy /opt/zettelkasten/compose/.env

            # iter-03 §1C.4: deploy provenance (DEPLOY_GIT_SHA / DEPLOY_ID /
            # DEPLOY_ACTOR) is included in the .env body above. apply_migrations
            # picks it up from container env via --env-file. deploy.sh extracts
            # only the DEPLOY_* lines into its own shell so the
            # ${VAR:-default} fall-throughs see the GH-supplied values without
            # full-sourcing the secrets-laden file.

            # ── 3. Ensure Caddy has --init (tini as PID 1) ──
            # Fixes "OCI runtime exec failed: procReady not received" in
            # non-root containers with cap_drop:ALL + no-new-privileges.
            # Idempotent: skips recreation if already enabled.
            # deploy user is in the docker group — no sudo needed.
            CADDY_INIT=$(docker inspect caddy --format '{{if .HostConfig.Init}}{{.HostConfig.Init}}{{else}}false{{end}}' 2>/dev/null || echo "missing")

            if [ "$CADDY_INIT" != "true" ]; then
              echo "[caddy] Recreating with --init (was: $CADDY_INIT)..."
              docker stop caddy 2>/dev/null || true
              docker rm caddy 2>/dev/null || true

              docker run -d \
                --name caddy \
                --hostname caddy \
                --init \
                --restart unless-stopped \
                --user 1000:1000 \
                --network zettelnet \
                -p 80:80 \
                -p 443:443 \
                -p 443:443/udp \
                -v /opt/zettelkasten/caddy/Caddyfile:/etc/caddy/Caddyfile:ro \
                -v /opt/zettelkasten/caddy/upstream.snippet:/etc/caddy/upstream.snippet:ro \
                -v /opt/zettelkasten/caddy/data:/data \
                -v /opt/zettelkasten/caddy/config:/config \
                -v /opt/zettelkasten/logs/caddy:/var/log/caddy \
                --memory 128m \
                --pids-limit 256 \
                --stop-timeout 10 \
                --cap-drop ALL \
                --cap-add NET_BIND_SERVICE \
                --security-opt no-new-privileges:true \
                --log-driver json-file \
                --log-opt max-size=10m \
                --log-opt max-file=3 \
                --health-cmd "wget --quiet --spider --no-check-certificate https://localhost/" \
                --health-interval 30s \
                --health-timeout 5s \
                --health-start-period 15s \
                --health-retries 3 \
                caddy:2

              # Wait for Caddy to become healthy before proceeding
              for i in $(seq 1 30); do
                STATUS=$(docker inspect caddy --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}' 2>/dev/null || echo "starting")
                if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                  echo "[caddy] Healthy after ${i}s"
                  break
                fi
                sleep 2
              done
            else
              echo "[caddy] Already has --init, skipping"
            fi

            # ── 4. Ensure deploy scripts are executable and LF-terminated ──
            # SCP doesn't preserve +x; sed is a safety net for pre-existing files
            chmod +x /opt/zettelkasten/deploy/*.sh
            sed -i 's/\r$//' /opt/zettelkasten/deploy/*.sh

            # ── 5. Run deploy with one retry ──
            # Audit metadata (DEPLOY_GIT_SHA / DEPLOY_ID / DEPLOY_ACTOR) is
            # included in the .env body written above; deploy.sh extracts only
            # those three names from /opt/zettelkasten/compose/.env at startup
            # (no full source — secrets stay scoped to docker --env-file).
            # Invocation uses the exact NOPASSWD-allowed form.
            for attempt in 1 2; do
              if sudo /opt/zettelkasten/deploy/deploy.sh "$SHA"; then
                exit 0
              fi

              if [ "$attempt" -lt 2 ]; then
                echo "Deploy attempt ${attempt} failed; retrying once after rollback..."
                sleep 5
              fi
            done

            exit 1
        env:
          ENV_BODY: ${{ steps.env.outputs.env_body }}
          GHCR_READ_PAT: ${{ secrets.GHCR_READ_PAT }}
          SHA: ${{ github.sha }}
