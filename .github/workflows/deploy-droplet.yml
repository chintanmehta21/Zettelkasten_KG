name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target_hostname:
        description: "Caddy hostname to deploy (zettelkasten.in or stage.zettelkasten.in)"
        required: false
        default: "zettelkasten.in"

concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: pytest (mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ops/requirements.txt
            ops/requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements-dev.txt
      - name: pytest
        env:
          TELEGRAM_BOT_TOKEN: "000:ci-stub"
          ALLOWED_CHAT_ID: "1"
          GEMINI_API_KEY: "ci-stub"
        run: pytest -q --maxfail=5

  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/chintanmehta21/zettelkasten-kg-website:${{ github.sha }}
            ghcr.io/chintanmehta21/zettelkasten-kg-website:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: SSH deploy to droplet
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      # Build the container .env body by iterating EVERY production
      # environment secret via toJSON(secrets). This eliminates the old
      # anti-pattern of 3 hardcoded key lists (new_envs.txt, sync script,
      # and this workflow) drifting apart — adding a new secret is now a
      # one-line edit in new_envs.txt + rerun of set_github_secrets.sh.
      #
      # BLOCKLIST: secrets consumed by the workflow itself (SSH, docker
      #            login, or GH's built-in GITHUB_TOKEN) that must NOT
      #            be written to the app's .env.
      # RENAME_MAP: GH secret name -> container env var name. Needed
      #            because GH reserves the GITHUB_ prefix, so production
      #            uses GH_*_FOR_NOTES which must remap to GITHUB_TOKEN /
      #            GITHUB_REPO at deploy time.
      - name: Build container .env body from environment secrets
        id: env
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          TARGET_HOST: ${{ inputs.target_hostname || 'zettelkasten.in' }}
        run: |
          set -euo pipefail

          BLOCKLIST='["DROPLET_HOST","DROPLET_SSH_USER","DROPLET_SSH_PORT","DROPLET_SSH_KEY","GHCR_READ_PAT","GITHUB_TOKEN"]'
          RENAME_MAP='{"GH_TOKEN_FOR_NOTES":"GITHUB_TOKEN","GH_REPO_FOR_NOTES":"GITHUB_REPO"}'

          SECRETS_BODY=$(printf '%s' "$SECRETS_JSON" | jq -r \
            --argjson blocklist "$BLOCKLIST" \
            --argjson rename "$RENAME_MAP" '
            to_entries
            | map(select(.key as $k | ($blocklist | index($k)) | not))
            | map(.key = ($rename[.key] // .key))
            | map(select(.value != null and .value != ""))
            | sort_by(.key)
            | map("\(.key)=\(.value)")
            | .[]
          ')

          STATIC_BODY=$(printf '%s\n' \
            "WEBHOOK_MODE=true" \
            "WEBHOOK_PORT=10000" \
            "WEBHOOK_URL=https://${TARGET_HOST}" \
            "NEXUS_ENABLED=true")

          FULL_ENV="${SECRETS_BODY}"$'\n'"${STATIC_BODY}"

          {
            echo "env_body<<ENV_BODY_EOF"
            printf '%s\n' "$FULL_ENV"
            echo "ENV_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          secret_count=$(printf '%s\n' "$SECRETS_BODY" | grep -c '=' || true)
          echo "Built .env with ${secret_count} secret line(s) + 4 static line(s)"

      - name: Write .env, reconcile Caddy, and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          envs: ENV_BODY,GHCR_READ_PAT,SHA
          command_timeout: 8m
          script: |
            set -euo pipefail

            # ── 1. Docker login ──
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u chintanmehta21 --password-stdin

            # ── 2. Write .env (tee/chmod/chown whitelisted in sudoers) ──
            printf '%s\n' "$ENV_BODY" | sudo /usr/bin/tee /opt/zettelkasten/compose/.env > /dev/null
            sudo /usr/bin/chmod 600 /opt/zettelkasten/compose/.env
            sudo /usr/bin/chown deploy:deploy /opt/zettelkasten/compose/.env

            # ── 3. Ensure Caddy has --init (tini as PID 1) ──
            # Fixes "OCI runtime exec failed: procReady not received" in
            # non-root containers with cap_drop:ALL + no-new-privileges.
            # Idempotent: skips recreation if already enabled.
            # deploy user is in the docker group — no sudo needed.
            CADDY_INIT=$(docker inspect caddy --format '{{if .HostConfig.Init}}{{.HostConfig.Init}}{{else}}false{{end}}' 2>/dev/null || echo "missing")

            if [ "$CADDY_INIT" != "true" ]; then
              echo "[caddy] Recreating with --init (was: $CADDY_INIT)..."
              docker stop caddy 2>/dev/null || true
              docker rm caddy 2>/dev/null || true

              docker run -d \
                --name caddy \
                --hostname caddy \
                --init \
                --restart unless-stopped \
                --user 1000:1000 \
                --network zettelnet \
                -p 80:80 \
                -p 443:443 \
                -p 443:443/udp \
                -v /opt/zettelkasten/caddy/Caddyfile:/etc/caddy/Caddyfile:ro \
                -v /opt/zettelkasten/caddy/upstream.snippet:/etc/caddy/upstream.snippet:ro \
                -v /opt/zettelkasten/caddy/data:/data \
                -v /opt/zettelkasten/caddy/config:/config \
                -v /opt/zettelkasten/logs/caddy:/var/log/caddy \
                --memory 128m \
                --pids-limit 256 \
                --stop-timeout 10 \
                --cap-drop ALL \
                --cap-add NET_BIND_SERVICE \
                --security-opt no-new-privileges:true \
                --log-driver json-file \
                --log-opt max-size=10m \
                --log-opt max-file=3 \
                --health-cmd "wget --quiet --spider --no-check-certificate https://localhost/" \
                --health-interval 30s \
                --health-timeout 5s \
                --health-start-period 15s \
                --health-retries 3 \
                caddy:2

              # Wait for Caddy to become healthy before proceeding
              for i in $(seq 1 30); do
                STATUS=$(docker inspect caddy --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}' 2>/dev/null || echo "starting")
                if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                  echo "[caddy] Healthy after ${i}s"
                  break
                fi
                sleep 2
              done
            else
              echo "[caddy] Already has --init, skipping"
            fi

            # ── 4. Run deploy with one retry ──
            for attempt in 1 2; do
              if sudo /opt/zettelkasten/deploy/deploy.sh "$SHA"; then
                exit 0
              fi

              if [ "$attempt" -lt 2 ]; then
                echo "Deploy attempt ${attempt} failed; retrying once after rollback..."
                sleep 5
              fi
            done

            exit 1
        env:
          ENV_BODY: ${{ steps.env.outputs.env_body }}
          GHCR_READ_PAT: ${{ secrets.GHCR_READ_PAT }}
          SHA: ${{ github.sha }}
