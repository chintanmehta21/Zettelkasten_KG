name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target_hostname:
        description: "Caddy hostname to deploy (zettelkasten.in or stage.zettelkasten.in)"
        required: false
        default: "zettelkasten.in"

concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: pytest (mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ops/requirements.txt
            ops/requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements-dev.txt
      - name: pytest
        env:
          TELEGRAM_BOT_TOKEN: "000:ci-stub"
          ALLOWED_CHAT_ID: "1"
          GEMINI_API_KEY: "ci-stub"
        run: pytest -q --maxfail=5

  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/chintanmehta21/zettelkasten-kg-website:${{ github.sha }}
            ghcr.io/chintanmehta21/zettelkasten-kg-website:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: SSH deploy to droplet
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the container .env body by iterating EVERY production
      # environment secret via toJSON(secrets). This eliminates the old
      # anti-pattern of 3 hardcoded key lists (new_envs.txt, sync script,
      # and this workflow) drifting apart - adding a new secret is now a
      # one-line edit in new_envs.txt + rerun of set_github_secrets.sh.
      #
      # BLOCKLIST: secrets consumed by the workflow itself (SSH, docker
      #            login, or GH's built-in GITHUB_TOKEN) that must NOT
      #            be written to the app's .env.
      # RENAME_MAP: GH secret name -> container env var name. Needed
      #            because GH reserves the GITHUB_ prefix, so production
      #            uses GH_*_FOR_NOTES which must remap to GITHUB_TOKEN /
      #            GITHUB_REPO at deploy time.
      - name: Build container .env body from environment secrets
        id: env
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          TARGET_HOST: ${{ inputs.target_hostname || 'zettelkasten.in' }}
        run: |
          set -euo pipefail

          BLOCKLIST='["DROPLET_HOST","DROPLET_SSH_USER","DROPLET_SSH_PORT","DROPLET_SSH_KEY","GHCR_READ_PAT","GITHUB_TOKEN"]'
          RENAME_MAP='{"GH_TOKEN_FOR_NOTES":"GITHUB_TOKEN","GH_REPO_FOR_NOTES":"GITHUB_REPO"}'

          SECRETS_BODY=$(printf '%s' "$SECRETS_JSON" | jq -r \
            --argjson blocklist "$BLOCKLIST" \
            --argjson rename "$RENAME_MAP" '
            to_entries
            | map(select(.key as $k | ($blocklist | index($k)) | not))
            | map(.key = ($rename[.key] // .key))
            | map(select(.value != null and .value != ""))
            | sort_by(.key)
            | map("\(.key)=\(.value)")
            | .[]
          ')

          STATIC_BODY=$(printf '%s\n' \
            "WEBHOOK_MODE=true" \
            "WEBHOOK_PORT=10000" \
            "WEBHOOK_URL=https://${TARGET_HOST}" \
            "NEXUS_ENABLED=true")

          FULL_ENV="${SECRETS_BODY}"$'\n'"${STATIC_BODY}"

          {
            echo "env_body<<ENV_BODY_EOF"
            printf '%s\n' "$FULL_ENV"
            echo "ENV_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          secret_count=$(printf '%s\n' "$SECRETS_BODY" | grep -c '=' || true)
          echo "Built .env with ${secret_count} secret line(s) + 4 static line(s)"

      - name: Capture deploy script payloads
        id: scripts
        run: |
          set -euo pipefail

          {
            echo "deploy_sh<<DEPLOY_SH_EOF"
            cat ops/deploy/deploy.sh
            echo "DEPLOY_SH_EOF"
            echo "rollback_sh<<ROLLBACK_SH_EOF"
            cat ops/deploy/rollback.sh
            echo "ROLLBACK_SH_EOF"
            echo "healthcheck_sh<<HEALTHCHECK_SH_EOF"
            cat ops/deploy/healthcheck.sh
            echo "HEALTHCHECK_SH_EOF"
            echo "reload_caddy_sh<<RELOAD_CADDY_SH_EOF"
            cat ops/deploy/reload_caddy.sh
            echo "RELOAD_CADDY_SH_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write .env on droplet and pull image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          envs: ENV_BODY,GHCR_READ_PAT,SHA,DEPLOY_SH,ROLLBACK_SH,HEALTHCHECK_SH,RELOAD_CADDY_SH
          script: |
            set -euo pipefail

            # deploy is in the docker group - no sudo needed for docker CLI.
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u chintanmehta21 --password-stdin

            # Keep the droplet's deploy scripts in sync with the repo revision
            # that triggered this workflow, otherwise remote deploy behavior drifts.
            printf '%s\n' "$DEPLOY_SH" | sudo /usr/bin/tee /opt/zettelkasten/deploy/deploy.sh > /dev/null
            printf '%s\n' "$ROLLBACK_SH" | sudo /usr/bin/tee /opt/zettelkasten/deploy/rollback.sh > /dev/null
            printf '%s\n' "$HEALTHCHECK_SH" | sudo /usr/bin/tee /opt/zettelkasten/deploy/healthcheck.sh > /dev/null
            printf '%s\n' "$RELOAD_CADDY_SH" | sudo /usr/bin/tee /opt/zettelkasten/deploy/reload_caddy.sh > /dev/null
            sudo /usr/bin/chmod 755 /opt/zettelkasten/deploy/deploy.sh /opt/zettelkasten/deploy/rollback.sh /opt/zettelkasten/deploy/healthcheck.sh /opt/zettelkasten/deploy/reload_caddy.sh
            sudo /usr/bin/chown deploy:deploy /opt/zettelkasten/deploy/deploy.sh /opt/zettelkasten/deploy/rollback.sh /opt/zettelkasten/deploy/healthcheck.sh /opt/zettelkasten/deploy/reload_caddy.sh

            # tee/chmod/chown are whitelisted in /etc/sudoers.d/deploy-zettelkasten.
            printf '%s\n' "$ENV_BODY" | sudo /usr/bin/tee /opt/zettelkasten/compose/.env > /dev/null
            sudo /usr/bin/chmod 600 /opt/zettelkasten/compose/.env
            sudo /usr/bin/chown deploy:deploy /opt/zettelkasten/compose/.env

            sudo /opt/zettelkasten/deploy/deploy.sh "$SHA"
        env:
          ENV_BODY: ${{ steps.env.outputs.env_body }}
          GHCR_READ_PAT: ${{ secrets.GHCR_READ_PAT }}
          SHA: ${{ github.sha }}
          DEPLOY_SH: ${{ steps.scripts.outputs.deploy_sh }}
          ROLLBACK_SH: ${{ steps.scripts.outputs.rollback_sh }}
          HEALTHCHECK_SH: ${{ steps.scripts.outputs.healthcheck_sh }}
          RELOAD_CADDY_SH: ${{ steps.scripts.outputs.reload_caddy_sh }}
