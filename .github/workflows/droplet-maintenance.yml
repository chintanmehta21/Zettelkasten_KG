name: Droplet maintenance (manual)

on:
  workflow_dispatch:
    inputs:
      aggressive:
        description: "Run aggressive cleanup (docker system prune -af --volumes, journal vacuum, apt clean)"
        required: false
        default: "true"

concurrency:
  group: droplet-maintenance
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  maintenance:
    name: SSH maintenance
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: SSH cleanup + disk/RAM report
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          envs: AGGRESSIVE
          command_timeout: 8m
          script: |
            set -euo pipefail
            echo "=== BEFORE ==="
            df -h / | tail -1
            free -h | head -2
            swapon --show || true
            docker system df

            # ── Ensure a 2G swapfile exists (idempotent, tolerant) ──
            # 1GB droplet runs our Python stack close to OOM; swap is mandatory.
            # If sudo is NOPASSWD-whitelisted only for specific paths (tee/chmod/chown),
            # the mkswap/swapon calls below will fail gracefully without blocking the job.
            if ! swapon --show 2>/dev/null | grep -q '/swapfile'; then
              echo ""
              echo "=== PROVISIONING SWAP (2G) ==="
              if sudo -n true 2>/dev/null; then
                sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
                sudo swapon /swapfile
                if ! grep -q '/swapfile' /etc/fstab; then
                  echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab > /dev/null
                fi
                sudo sysctl -w vm.swappiness=10 || true
                sudo sysctl -w vm.vfs_cache_pressure=50 || true
                grep -q '^vm.swappiness' /etc/sysctl.conf || echo 'vm.swappiness=10' | sudo tee -a /etc/sysctl.conf > /dev/null
                grep -q '^vm.vfs_cache_pressure' /etc/sysctl.conf || echo 'vm.vfs_cache_pressure=50' | sudo tee -a /etc/sysctl.conf > /dev/null
                echo "Swap provisioned."
              else
                echo "Deploy user lacks passwordless sudo for swap commands; skip."
              fi
            else
              echo "Swap already present."
            fi

            echo ""
            echo "=== RUNNING CONTAINERS ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'

            echo ""
            echo "=== STOPPED CONTAINERS (will be removed) ==="
            docker ps -a --filter "status=exited" --filter "status=dead" --format 'table {{.Names}}\t{{.Status}}' | head -30

            echo ""
            echo "=== PRUNING ==="
            # Always-safe prune (keeps anything currently in use)
            docker container prune -f || true
            docker network prune -f || true
            # Images not referenced by any container
            docker image prune -af || true

            if [ "${AGGRESSIVE:-true}" = "true" ]; then
              # Volumes not referenced by any container (keeps dev-* volumes on dev compose)
              docker volume prune -f || true
              # Full system prune (uses 'until' filter to protect any image pulled in last hour)
              docker system prune -af --filter "until=1h" || true
            fi

            # OS-level cleanup
            sudo journalctl --vacuum-size=200M || true
            sudo apt-get clean || true
            sudo rm -rf /var/cache/apt/archives/*.deb /tmp/*.log 2>/dev/null || true

            # Caddy rotated logs older than 14 days
            sudo find /opt/zettelkasten/logs -type f -name '*.gz' -mtime +14 -delete 2>/dev/null || true
            sudo find /opt/zettelkasten/logs -type f -name '*.log.*' -mtime +14 -delete 2>/dev/null || true

            echo ""
            echo "=== AFTER ==="
            df -h / | tail -1
            free -h | head -2
            swapon --show || true
            docker system df
        env:
          AGGRESSIVE: ${{ inputs.aggressive }}
