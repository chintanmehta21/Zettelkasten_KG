name: Recompute KG Usage Edges

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC nightly
  workflow_dispatch:

concurrency:
  group: recompute-usage-edges
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recompute:
    name: Recompute kg_usage_edges_agg
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ops/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements.txt
      - name: Run recompute
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ops/scripts/recompute_usage_edges.py
