name: Read Recent Logs

# iter-03 §1D.1: on-demand droplet log fetcher. SSHes to the production
# droplet, tails the active (or specified) blue/green container's logs,
# uploads them as a workflow artifact for download. Useful for post-incident
# triage without needing direct SSH access from a laptop.

on:
  workflow_dispatch:
    inputs:
      tail_lines:
        description: "Number of log lines to tail"
        type: number
        default: 500
      color:
        description: "Color (blue / green / auto)"
        type: choice
        options: [auto, blue, green]
        default: auto

jobs:
  tail:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH and dump logs to /tmp
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          script: |
            set -euo pipefail
            COLOR="${{ inputs.color }}"
            if [ "$COLOR" = "auto" ]; then
                COLOR="$(cat /opt/zettelkasten/ACTIVE_COLOR 2>/dev/null || echo blue)"
            fi
            echo "[read_recent_logs] tailing color=$COLOR lines=${{ inputs.tail_lines }}"
            cd /opt/zettelkasten/compose
            docker compose -f docker-compose.${COLOR}.yml logs \
                --tail ${{ inputs.tail_lines }} \
                > /tmp/recent_logs.txt 2>&1
            wc -l /tmp/recent_logs.txt

      - name: Fetch logs back to runner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          source: /tmp/recent_logs.txt
          target: ./

      - uses: actions/upload-artifact@v4
        with:
          name: recent-logs
          path: recent_logs.txt
          retention-days: 7
