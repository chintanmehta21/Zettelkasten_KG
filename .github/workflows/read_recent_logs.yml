name: Read Recent Logs

# iter-03 §1D.1: on-demand droplet log fetcher. SSHes to the production
# droplet, tails the active (or specified) blue/green container's logs,
# uploads them as a workflow artifact for download. Useful for post-incident
# triage without needing direct SSH access from a laptop.

on:
  workflow_dispatch:
    inputs:
      tail_lines:
        description: "Number of log lines to tail (docker compose logs / caddy access)"
        type: number
        default: 500
      color:
        description: "Color (blue / green / auto)"
        type: choice
        options: [auto, blue, green]
        default: auto
      # iter-09 Task 6 — windowed log retrieval for q5 500 root-cause and other
      # post-incident triage. `since` accepts journalctl --since formats
      # (RFC3339, "6 hours ago", "yesterday", etc.). When set, journalctl runs
      # with --since "$since" --lines $lines instead of the default --since "6
      # hours ago" + grep filter.
      lines:
        description: "journalctl --lines (default 5000 when since is set)"
        type: number
        default: 5000
      since:
        description: 'journalctl --since (e.g. 2026-05-03T15:48:00Z); empty = default 6h grep window'
        type: string
        default: ""

jobs:
  tail:
    runs-on: ubuntu-latest
    # Production-scoped secrets (DROPLET_HOST etc.) live on the `production`
    # environment — the deploy-droplet workflow uses the same scope.
    environment: production
    timeout-minutes: 5
    steps:
      - name: SSH dump container logs + dmesg + free + caddy access (inline stdout)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          # capture_stdout=true makes the appleboy action surface the script's
          # stdout into the workflow log (and in the action's outputs). We
          # inline-cat the logs rather than tarring them back via scp because
          # the scp pull-from-host pattern is not how appleboy/scp-action
          # works (it uploads, not downloads).
          capture_stdout: true
          script: |
            set -euo pipefail
            COLOR="${{ inputs.color }}"
            if [ "$COLOR" = "auto" ]; then
                COLOR="$(cat /opt/zettelkasten/ACTIVE_COLOR 2>/dev/null || echo blue)"
            fi
            LINES=${{ inputs.tail_lines }}
            JCTL_LINES=${{ inputs.lines }}
            JCTL_SINCE='${{ inputs.since }}'
            echo "===== [read_recent_logs] color=$COLOR lines=$LINES jctl_lines=$JCTL_LINES jctl_since=$JCTL_SINCE ====="
            echo "===== free -h ====="
            free -h
            echo "===== docker ps ====="
            # deploy user is in the docker group — no sudo needed (and the
            # droplet sudoers config has no NOPASSWD rule for `docker`).
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
            echo "===== docker inspect (OOMKilled / ExitCode / RestartCount) ====="
            for c in zettelkasten-blue zettelkasten-green caddy; do
              docker inspect "$c" --format \
                'name={{.Name}} oom_killed={{.State.OOMKilled}} exit={{.State.ExitCode}} restarts={{.RestartCount}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' \
                2>/dev/null || echo "  (no $c container)"
            done
            echo "===== docker events (last 6h, oom + die only) ====="
            docker events --since 6h --until 0m \
              --filter event=oom --filter event=die --filter event=kill \
              --format 'time={{.Time}} type={{.Type}} action={{.Action}} actor={{.Actor.Attributes.name}}' \
              2>/dev/null || true
            echo "===== cgroup v2 memory.events (OOM counters per-container) ====="
            for f in /sys/fs/cgroup/system.slice/docker-*.scope/memory.events; do
              [ -r "$f" ] || continue
              echo "--- $f ---"
              cat "$f" 2>/dev/null || true
            done
            echo "===== cgroup v2 memory.peak (per-container hi-water) ====="
            for f in /sys/fs/cgroup/system.slice/docker-*.scope/memory.peak; do
              [ -r "$f" ] || continue
              echo "$f: $(cat "$f" 2>/dev/null)"
            done
            echo "===== cgroup v2 memory.stat (anon/file/slab/swap breakdown) ====="
            for f in /sys/fs/cgroup/system.slice/docker-*.scope/memory.stat; do
              [ -r "$f" ] || continue
              echo "--- $f ---"
              cat "$f" 2>/dev/null | head -25
            done
            echo "===== top -bn1 -o RES (top 8 by RSS) ====="
            top -bn1 -o RES 2>&1 | head -15 || true
            echo "===== docker exec proc memory per worker (RSS+swap) ====="
            for c in zettelkasten-blue zettelkasten-green; do
              [ -n "$(docker ps -q -f name=$c)" ] || continue
              echo "--- $c ---"
              docker exec "$c" sh -c '
                for pid in $(pgrep -f "gunicorn|uvicorn|python" 2>/dev/null); do
                  [ -r /proc/$pid/status ] || continue
                  echo "pid=$pid $(grep -E "^(Name|VmRSS|VmSwap|VmSize|RssAnon|RssFile|RssShmem)" /proc/$pid/status | tr "\n" " ")"
                done
              ' 2>/dev/null || echo "  (exec failed)"
            done
            echo "===== docker exec smaps_rollup (swap by category, blue+green) ====="
            for c in zettelkasten-blue zettelkasten-green; do
              [ -n "$(docker ps -q -f name=$c)" ] || continue
              echo "--- $c ---"
              docker exec "$c" sh -c '
                for pid in $(pgrep -f "gunicorn|uvicorn|python" 2>/dev/null | head -3); do
                  [ -r /proc/$pid/smaps_rollup ] || continue
                  echo "  pid=$pid:"
                  grep -E "^(Rss|Pss|Anonymous|Swap|Shared_|Private_)" /proc/$pid/smaps_rollup 2>/dev/null \
                    | sed "s/^/    /"
                done
              ' 2>/dev/null || echo "  (exec failed)"
            done
            echo "===== journalctl -k (kernel ring; OOM only, last 6h) ====="
            # systemd-journal group membership grants kernel-message read; if
            # not granted this returns an error but doesn't fail the script.
            journalctl -k --since "6 hours ago" --no-pager 2>&1 \
              | grep -iE 'oom|out of memory|killed process|invoked oom' \
              | head -50 \
              || echo "  (no kernel OOM events found, or journal not readable by deploy user)"
            if [ -n "$JCTL_SINCE" ]; then
              echo "===== journalctl windowed (--since '$JCTL_SINCE' --lines $JCTL_LINES) ====="
              # iter-09 Task 6: full windowed dump (no OOM-only filter). Used to
              # surface app tracebacks around a known incident timestamp.
              journalctl --since "$JCTL_SINCE" --lines "$JCTL_LINES" --no-pager 2>&1 \
                || echo "  (journalctl windowed read failed)"
            fi
            echo "===== /var/log/kern.log + /var/log/syslog (OOM grep; if readable) ====="
            for log in /var/log/kern.log /var/log/syslog; do
              [ -r "$log" ] || continue
              echo "--- $log ---"
              grep -iE 'oom|out of memory|killed process' "$log" 2>/dev/null \
                | tail -50 || true
            done
            echo "===== app container logs (--tail $LINES) ====="
            cd /opt/zettelkasten/compose
            docker compose -f docker-compose.${COLOR}.yml logs --tail ${LINES} 2>&1 || true
            echo "===== caddy access (last $LINES) ====="
            # /opt/zettelkasten/logs/caddy is owned by deploy:deploy per
            # deploy.sh — readable directly without sudo.
            tail -n ${LINES} /opt/zettelkasten/logs/caddy/access.log 2>/dev/null || true
            echo "===== END ====="
