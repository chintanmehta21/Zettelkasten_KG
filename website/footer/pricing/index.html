<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Pricing | Zettelkasten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=20260407a">
  <link rel="stylesheet" href="/header/css/header.css?v=20260418a">
  <link rel="stylesheet" href="/user-pricing/css/purchase_launcher.css?v=20260501a">
  <link rel="stylesheet" href="/pricing/css/pricing.css?v=20260502r">
</head>
<body>
  <!--ZK_HEADER-->

  <main class="pricing-shell">
    <section class="pricing-hero">
      <p class="pricing-kicker">Pricing</p>
      <h1>Fuel your knowledge system without breaking your flow.</h1>
      <p>
        Subscriptions cover steady Zettel, Kasten, and RAG usage. Packs add overflow credits exactly when a workflow needs more room.
      </p>
    </section>

    <section class="pricing-switcher" aria-label="Pricing mode">
      <div class="pricing-tabs" role="tablist">
        <button class="pricing-tab is-active" role="tab" aria-selected="true" aria-controls="subscription-panel" id="subscription-tab" data-tab="subscription">Subscription</button>
        <button class="pricing-tab" role="tab" aria-selected="false" aria-controls="adhoc-panel" id="adhoc-tab" data-tab="custom">Custom</button>
      </div>
    </section>

    <section class="pricing-panel is-active" id="subscription-panel" role="tabpanel" aria-labelledby="subscription-tab">
      <div class="pricing-grid" id="subscription-grid" aria-live="polite"></div>
    </section>

    <section class="pricing-panel" id="adhoc-panel" role="tabpanel" aria-labelledby="adhoc-tab">
      <div class="pack-groups" id="pack-groups" aria-live="polite"></div>
    </section>
  </main>

  <!--ZK_FOOTER-->

  <script src="/header/js/header.js?v=20260418a"></script>
  <script src="/user-pricing/js/purchase_launcher.js?v=20260502g"></script>
  <script src="/pricing/js/pricing.js?v=20260502i"></script>
</body>
</html>
