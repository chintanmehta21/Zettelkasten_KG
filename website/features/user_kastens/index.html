<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Kastens - Zettelkasten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=20260417a">
    <link rel="stylesheet" href="/header/css/header.css?v=20260418f">
    <link rel="stylesheet" href="/home/kastens/css/user_kastens.css?v=20260418a">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container kastens-container">
<!--ZK_HEADER-->

        <main class="main kastens-main" id="main-content">
            <section class="kastens-hero">
                <div class="kastens-hero-copy">
                    <h1 class="kastens-title">My Kastens</h1>
                    <p class="kastens-subtitle">Curated collections of zettels that you can chat with as focused sandboxes.</p>
                </div>

                <button class="kastens-add-circle" id="create-kasten-btn" data-action="create-kasten" type="button" aria-label="Create kasten" title="Create Kasten">
                    <span aria-hidden="true">+</span>
                </button>
            </section>

            <section class="kastens-stats" aria-label="Kasten statistics">
                <article class="kastens-stat-card">
                    <p class="kastens-stat-label">Kastens</p>
                    <p class="kastens-stat-value" id="stat-kastens">0</p>
                </article>
                <article class="kastens-stat-card">
                    <p class="kastens-stat-label">Zettels Included</p>
                    <p class="kastens-stat-value" id="stat-members">0</p>
                </article>
                <article class="kastens-stat-card">
                    <p class="kastens-stat-label">Latest Kasten</p>
                    <p class="kastens-stat-value kastens-stat-small" id="stat-latest">—</p>
                </article>
            </section>

            <section class="kastens-grid-section" aria-live="polite">
                <div class="kastens-grid" id="kastens-grid"></div>
                <div class="kastens-empty hidden" id="kastens-empty">
                    <h2>No kastens yet</h2>
                    <p>Create your first curated workspace to start asking better questions.</p>
                </div>
            </section>
        </main>

        <!--ZK_FOOTER-->
</div>

    <!-- Create Kasten Modal -->
    <div class="create-kasten-overlay hidden" id="create-kasten-overlay" role="dialog" aria-modal="true" aria-labelledby="create-kasten-title">
        <div class="create-kasten-backdrop" data-close-kasten></div>
        <div class="create-kasten-dialog">
            <button type="button" class="create-kasten-close" aria-label="Close" data-close-kasten>&times;</button>
            <h2 class="create-kasten-title" id="create-kasten-title">Create Kasten</h2>
            <p class="create-kasten-subtitle">Group zettels into a focused chat sandbox</p>
            <form class="create-kasten-form" id="create-kasten-form" novalidate>
                <label class="create-kasten-label" for="kasten-name">Name</label>
                <input type="text" id="kasten-name" class="create-kasten-input" maxlength="80" required placeholder="e.g. Climate research" />

                <label class="create-kasten-label">Default quality</label>
                <div class="create-kasten-quality" role="radiogroup" aria-label="Default quality">
                    <label class="create-kasten-quality-opt">
                        <input type="radio" name="kasten-quality" value="fast" checked />
                        <span class="create-kasten-quality-card">
                            <span class="create-kasten-quality-name">Fast</span>
                            <span class="create-kasten-quality-desc">Lower latency, lighter model</span>
                        </span>
                    </label>
                    <label class="create-kasten-quality-opt">
                        <input type="radio" name="kasten-quality" value="high" />
                        <span class="create-kasten-quality-card">
                            <span class="create-kasten-quality-name">Strong</span>
                            <span class="create-kasten-quality-desc">Deeper reasoning, higher quality</span>
                        </span>
                    </label>
                </div>

                <label class="create-kasten-label">Zettels to include</label>
                <div class="create-kasten-members" role="radiogroup" aria-label="Zettels to include">
                    <label class="create-kasten-members-opt">
                        <input type="radio" name="kasten-scope" value="all" checked />
                        <span class="create-kasten-members-card">
                            <span class="create-kasten-members-name">All</span>
                            <span class="create-kasten-members-desc">Every zettel you own</span>
                        </span>
                    </label>
                    <label class="create-kasten-members-opt">
                        <input type="radio" name="kasten-scope" value="source" />
                        <span class="create-kasten-members-card">
                            <span class="create-kasten-members-name">By source</span>
                            <span class="create-kasten-members-desc">Pick source types</span>
                        </span>
                    </label>
                    <label class="create-kasten-members-opt">
                        <input type="radio" name="kasten-scope" value="specific" />
                        <span class="create-kasten-members-card">
                            <span class="create-kasten-members-name">Specific</span>
                            <span class="create-kasten-members-desc">Choose zettels</span>
                        </span>
                    </label>
                </div>

                <div class="create-kasten-scope-panel hidden" id="kasten-scope-source-panel">
                    <label class="create-kasten-label">Source types</label>
                    <div class="create-kasten-source-grid" id="kasten-source-grid">
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="youtube" /> YouTube</label>
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="github" /> GitHub</label>
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="reddit" /> Reddit</label>
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="substack" /> Substack</label>
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="medium" /> Medium</label>
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="twitter" /> Twitter</label>
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="web" /> Web</label>
                        <label class="create-kasten-source-chip"><input type="checkbox" name="kasten-source" value="generic" /> Generic</label>
                    </div>
                </div>

                <div class="create-kasten-scope-panel hidden" id="kasten-scope-specific-panel">
                    <div class="create-kasten-chooser-header">
                        <label class="create-kasten-label" style="margin:0">Pick zettels</label>
                        <button type="button" class="chooser-refresh" id="kasten-chooser-refresh" title="Refresh zettel list">&#x21BB; Refresh</button>
                    </div>
                    <div class="create-kasten-zettels">
                        <input type="search" class="create-kasten-zettel-search" id="kasten-zettel-search" placeholder="Filter your zettels..." autocomplete="off" />
                        <div class="create-kasten-zettel-list" id="kasten-zettel-list"></div>
                    </div>
                </div>

                <label class="create-kasten-label" for="kasten-desc">Description <span class="create-kasten-optional">(optional)</span></label>
                <textarea id="kasten-desc" class="create-kasten-textarea" rows="3" maxlength="500" placeholder="What is this kasten about?"></textarea>

                <p class="create-kasten-error" id="create-kasten-error" aria-live="polite"></p>
                <div class="create-kasten-actions">
                    <button type="button" class="create-kasten-cancel" data-close-kasten>Cancel</button>
                    <button type="submit" class="create-kasten-submit" id="create-kasten-submit">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/header/js/header.js?v=20260417a"></script>
    <script src="/home/kastens/js/user_kastens.js?v=20260418a"></script>
</body>
</html>
