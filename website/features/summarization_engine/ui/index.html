<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Summarization | Zettelkasten</title>
  <link rel="stylesheet" href="/summarization-engine/css/dashboard.css">
</head>
<body>
  <main class="engine-shell">
    <section class="engine-panel">
      <p class="eyebrow">Batch capture</p>
      <h1>Summarize a reading queue</h1>
      <form id="batch-form">
        <label for="urls">URLs</label>
        <textarea id="urls" name="urls" rows="10" placeholder="https://example.com/article"></textarea>
        <button type="submit">Run batch</button>
      </form>
      <pre id="output" aria-live="polite"></pre>
    </section>
  </main>
  <script src="/summarization-engine/js/dashboard.js"></script>
</body>
</html>
