<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Zettels - Zettelkasten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=20260407a">
    <link rel="stylesheet" href="/header/css/header.css?v=20260417a">
    <link rel="stylesheet" href="/home/zettels/css/user_zettels.css?v=20260415a">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="container zettels-container">
<!--ZK_HEADER-->

        <main class="main zettels-main" id="main-content">
            <section class="zettels-hero">
                <div class="zettels-hero-copy">
                    <h1 class="zettels-title">My Zettels</h1>
                    <p class="zettels-subtitle">Search, filter, sort, and maintain your full personal knowledge stream.</p>
                </div>

                <div class="zettels-add-wrap" id="add-zettel-wrap">
                    <button class="zettels-add-circle" id="add-zettel-btn" aria-label="Add a zettel" title="Add Zettel">
                        <span aria-hidden="true">+</span>
                    </button>
                    <div class="home-add-dropdown" id="add-zettel-dropdown">
                        <form id="add-zettel-form" class="home-add-form">
                            <div class="home-add-row">
                                <input type="url" id="add-url-input" class="home-add-input" placeholder="https://…" aria-label="URL to capture" required />
                                <button type="submit" class="home-add-submit" id="add-submit-btn">Add</button>
                            </div>
                            <p class="home-add-error" id="add-error"></p>
                        </form>
                    </div>
                </div>
            </section>

            <section class="zettels-stats" aria-label="Zettel statistics">
                <article class="zettels-stat-card">
                    <p class="zettels-stat-label">Total Zettels</p>
                    <p class="zettels-stat-value" id="stat-total">0</p>
                </article>
                <article class="zettels-stat-card">
                    <p class="zettels-stat-label">Sources</p>
                    <p class="zettels-stat-value" id="stat-sources">0</p>
                </article>
                <article class="zettels-stat-card">
                    <p class="zettels-stat-label">Latest Capture</p>
                    <p class="zettels-stat-value zettels-stat-date" id="stat-latest">-</p>
                </article>
            </section>

            <section class="zettels-toolbar" aria-label="Search and filter zettels">
                <div class="zettels-search-column">
                    <span class="zettels-select-label zettels-select-label-spacer" aria-hidden="true">&nbsp;</span>
                    <label class="zettels-search-wrap" for="zettels-search">
                        <span class="zettels-search-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none">
                                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
                                <path d="M20 20L16.8 16.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                            </svg>
                        </span>
                        <input id="zettels-search" class="zettels-search-input" name="search" type="search" placeholder="Search title, summary, tags..." autocomplete="off" />
                    </label>
                </div>

                <div class="zettels-filter-wrap" id="filters-wrap">
                    <span class="zettels-select-label">Filters</span>
                    <button class="zettels-filter-trigger" id="filters-btn" type="button" aria-haspopup="true" aria-expanded="false">
                        <span id="filters-btn-text">All Filters</span>
                        <span class="zettels-select-chevron" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none"><path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </span>
                    </button>

                    <div class="zettels-filter-menu" id="filters-menu" role="menu">
                        <button class="zettels-filter-parent" id="filter-parent-source" data-submenu="source" type="button" role="menuitem">
                            <span>Source</span>
                            <span class="zettels-submenu-arrow">&rsaquo;</span>
                        </button>
                        <button class="zettels-filter-parent" id="filter-parent-tags" data-submenu="tags" type="button" role="menuitem">
                            <span>Tags</span>
                            <span class="zettels-submenu-arrow">&rsaquo;</span>
                        </button>
                        <button class="zettels-filter-clear" id="filters-clear" type="button" role="menuitem">Clear Filters</button>

                        <div class="zettels-filter-submenu" id="submenu-source" role="menu"></div>
                        <div class="zettels-filter-submenu" id="submenu-tags" role="menu"></div>
                    </div>
                </div>

                <div class="zettels-filter-wrap zettels-sort-wrap" id="sort-wrap">
                    <span class="zettels-select-label">Sort</span>
                    <button class="zettels-filter-trigger" id="sort-btn" type="button" aria-haspopup="true" aria-expanded="false">
                        <span id="sort-btn-text">Newest First</span>
                        <span class="zettels-select-chevron" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none"><path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </span>
                    </button>
                    <div class="zettels-filter-menu zettels-sort-menu" id="sort-menu" role="menu">
                        <button class="zettels-filter-sub-option sort-option selected" type="button" data-sort="newest" role="menuitemradio" aria-checked="true">Newest First</button>
                        <button class="zettels-filter-sub-option sort-option" type="button" data-sort="oldest" role="menuitemradio" aria-checked="false">Oldest First</button>
                        <button class="zettels-filter-sub-option sort-option" type="button" data-sort="title" role="menuitemradio" aria-checked="false">Title (A-Z)</button>
                        <button class="zettels-filter-sub-option sort-option" type="button" data-sort="summary_long" role="menuitemradio" aria-checked="false">Longest Summary</button>
                        <button class="zettels-filter-sub-option sort-option" type="button" data-sort="summary_short" role="menuitemradio" aria-checked="false">Shortest Summary</button>
                    </div>
                </div>
            </section>

            <section class="zettels-list-section" aria-live="polite">
                <div class="zettels-list" id="zettels-list"></div>
                <div class="zettels-empty hidden" id="zettels-empty">
                    <h2>No matching zettels</h2>
                    <p>Try adjusting search, filters, or sort.</p>
                </div>
            </section>
        </main>

    <div class="zettels-summary-overlay hidden" id="summary-overlay">
        <div class="zettels-summary-backdrop" id="summary-backdrop"></div>
        <section class="zettels-summary-modal" role="dialog" aria-modal="true" aria-labelledby="summary-title">
            <button class="zettels-summary-close" id="summary-close" aria-label="Close summary">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
            </button>
            <div class="zettels-summary-meta-row">
                <span class="zettels-source-badge" id="summary-source">Source</span>
                <span class="zettels-summary-date" id="summary-date"></span>
            </div>
            <h2 class="zettels-summary-title" id="summary-title"></h2>
            <p class="zettels-summary-text" id="summary-text"></p>
            <div class="zettels-summary-tags" id="summary-tags"></div>
        </section>
    </div>

    <div class="zettels-undo-toast hidden" id="undo-toast" role="status" aria-live="polite">
        <span class="zettels-undo-text" id="undo-text">Zettel deleted.</span>
        <button class="zettels-undo-btn" id="undo-btn" type="button">Undo</button>
        <span class="zettels-undo-time" id="undo-time">5s</span>
    </div>
