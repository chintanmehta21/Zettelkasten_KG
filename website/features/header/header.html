<header class="header zk-header" data-zk-header>
    <div class="zk-header-start">
        <button type="button" class="zk-back-btn" data-zk-back aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
    </div>

    <div class="branding zk-branding">
        <div class="logo zk-logo">
            <img src="/artifacts/company_logo.svg" alt="" class="logo-icon zk-logo-icon" width="34" height="34" />
            <span class="logo-text zk-logo-text">Zettelkasten</span>
        </div>
        <p class="tagline zk-tagline">The second brain you were promised!</p>
    </div>

    <div class="zk-header-end">
        <div class="home-avatar-wrap zk-avatar-wrap" id="avatar-wrap">
            <button class="home-avatar-btn zk-avatar-btn" id="avatar-btn" title="Account menu" aria-label="Open account menu">
                <!-- Empty alt + no src: browsers never render alt text on fail, never fire a spurious 404 -->
                <img class="home-avatar-img" id="avatar-img" alt="" width="32" height="32" hidden />
                <span class="home-avatar-fallback" id="avatar-fallback" aria-hidden="true">
                    <!-- Generic user glyph as the last-resort no-JS fallback (CSS hides it once img loads) -->
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="9" r="3.2" stroke="currentColor" stroke-width="1.8"/><path d="M5 19c1.4-3.4 4.1-5 7-5s5.6 1.6 7 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                </span>
            </button>
            <div class="home-dropdown zk-dropdown" id="avatar-dropdown" role="menu">
                <a class="home-dropdown-item" href="/home" role="menuitem">
                    <span class="home-dropdown-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M4 11.5L12 5L20 11.5V19A1 1 0 0 1 19 20H5A1 1 0 0 1 4 19V11.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </span>
                    <span class="home-dropdown-label">Dashboard</span>
                </a>
                <a class="home-dropdown-item" href="/home/zettels" role="menuitem">
                    <span class="home-dropdown-icon" aria-hidden="true">
                        <span class="home-dropdown-mask" style="--mask-url:url(/artifacts/logo-zettelkasten.svg)"></span>
                    </span>
                    <span class="home-dropdown-label">My Zettels</span>
                </a>
                <a class="home-dropdown-item" href="/home/kastens" role="menuitem">
                    <span class="home-dropdown-icon" aria-hidden="true">
                        <span class="home-dropdown-mask" style="--mask-url:url(/artifacts/logo-kastens.svg)"></span>
                    </span>
                    <span class="home-dropdown-label">My Kastens</span>
                </a>
                <a class="home-dropdown-item" href="/home/nexus" id="menu-nexus" role="menuitem">
                    <span class="home-dropdown-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.8"></circle><ellipse cx="12" cy="12" rx="4" ry="8.5" stroke="currentColor" stroke-width="1.8"></ellipse><path d="M3.5 12h17M5 7.5h14M5 16.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg>
                    </span>
                    <span class="home-dropdown-label">Nexus</span>
                    <span class="home-dropdown-labs" title="Experimental" aria-label="Experimental">
                        <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M9 3h6M10 3v5.5L5.5 18a2 2 0 0 0 1.8 2.9h9.4A2 2 0 0 0 18.5 18L14 8.5V3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path><path d="M7.5 14h9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path></svg>
                    </span>
                </a>
                <a class="home-dropdown-item" href="/knowledge-graph" role="menuitem">
                    <span class="home-dropdown-icon" aria-hidden="true">
                        <span class="home-dropdown-mask" style="--mask-url:url(/artifacts/logo-knowledge-graph.svg)"></span>
                    </span>
                    <span class="home-dropdown-label">My Knowledge Graph</span>
                </a>
                <div class="home-dropdown-divider"></div>
                <button class="home-dropdown-item home-dropdown-signout" id="menu-signout" role="menuitem">
                    <span class="home-dropdown-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M14 17L19 12L14 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path><path d="M19 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M12 20H6A1 1 0 0 1 5 19V5A1 1 0 0 1 6 4H12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path></svg>
                    </span>
                    <span class="home-dropdown-label">Sign out</span>
                </button>
            </div>
        </div>
    </div>
</header>
