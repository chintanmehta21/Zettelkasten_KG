<svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Knowledge Graph logo — bold share/network style -->
  <!-- Inspired by molecular/share icon: thick ring nodes + bar connectors -->
  <!-- Color palette: teal accent from Zettelkasten design system -->

  <!-- Connector bars (behind nodes) -->
  <!-- Top-left node → top-right node -->
  <line x1="9" y1="8" x2="22" y2="6" stroke="#3ECFB4" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Top-left node → bottom-center node -->
  <line x1="9" y1="10" x2="14" y2="24" stroke="#3ECFB4" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Top-right node → bottom-center node -->
  <line x1="24" y1="8" x2="16" y2="24" stroke="#3ECFB4" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- Node: top-left (large, primary) -->
  <circle cx="8" cy="8" r="5.5" fill="#3ECFB4"/>
  <circle cx="8" cy="8" r="2.5" fill="#0D1117"/>

  <!-- Node: top-right (medium) -->
  <circle cx="24" cy="6" r="4.5" fill="#3ECFB4" opacity="0.85"/>
  <circle cx="24" cy="6" r="2" fill="#0D1117"/>

  <!-- Node: bottom-center (medium) -->
  <circle cx="15" cy="25" r="4.5" fill="#3ECFB4" opacity="0.85"/>
  <circle cx="15" cy="25" r="2" fill="#0D1117"/>
</svg>
