<svg width="22" height="22" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- KG logo — matches KG_Graph_Updated.png exactly -->
  <!-- Large central white ring + 4 satellite rings connected by thick bars -->
  <!-- Top-left open ring, top-right dumbbell pair, bottom-left ring -->

  <!-- Connector bars (behind nodes) -->
  <line x1="26" y1="28" x2="14" y2="14" stroke="#3ECFB4" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="38" y1="26" x2="46" y2="14" stroke="#3ECFB4" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="52" y1="12" x2="46" y2="14" stroke="#3ECFB4" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="26" y1="40" x2="16" y2="54" stroke="#3ECFB4" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Central node — large hollow white ring -->
  <circle cx="32" cy="34" r="11" stroke="#CBD5E1" stroke-width="5" fill="none"/>

  <!-- Top-left node — open ring (gap at bottom-left like reference) -->
  <path d="M 8,8 A 7,7 0 1 1 7,18" stroke="#3ECFB4" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Top-right node pair — two connected small rings (dumbbell) -->
  <circle cx="46" cy="12" r="5" stroke="#3ECFB4" stroke-width="4" fill="none"/>
  <circle cx="58" cy="10" r="4" stroke="#3ECFB4" stroke-width="3.5" fill="none"/>

  <!-- Bottom-left node — small ring -->
  <circle cx="14" cy="56" r="5.5" stroke="#3ECFB4" stroke-width="4" fill="none"/>
</svg>
