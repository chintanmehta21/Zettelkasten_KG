<svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Knowledge Graph — share/network icon, cool silver palette -->
  <!-- Central large hollow ring + 3 smaller rings at 10, 2, 7 o'clock -->

  <!-- Arms (behind nodes) -->
  <line x1="14" y1="13" x2="7" y2="7" stroke="#8BA3B8" stroke-width="3" stroke-linecap="round"/>
  <line x1="19" y1="13" x2="26" y2="7" stroke="#8BA3B8" stroke-width="3" stroke-linecap="round"/>
  <line x1="15" y1="20" x2="8" y2="27" stroke="#8BA3B8" stroke-width="3" stroke-linecap="round"/>

  <!-- Central node — large hollow ring, silver-white -->
  <circle cx="16" cy="16" r="6" stroke="#CBD5E1" stroke-width="3" fill="none"/>

  <!-- Top-left node (10 o'clock) -->
  <circle cx="5.5" cy="5.5" r="3.5" stroke="#8BA3B8" stroke-width="2.5" fill="none"/>

  <!-- Top-right node (2 o'clock) -->
  <circle cx="27" cy="5.5" r="3" stroke="#8BA3B8" stroke-width="2.5" fill="none"/>

  <!-- Bottom-left node (7 o'clock) -->
  <circle cx="6.5" cy="28" r="3" stroke="#8BA3B8" stroke-width="2.5" fill="none"/>
</svg>
