<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Kastens icon: slip-box (card drawer) with upright index cards -->
  <!-- Box / drawer body -->
  <rect x="3" y="9" width="22" height="15" rx="2" stroke="#3ECFB4" stroke-width="1.6" fill="none" opacity="0.9"/>
  <!-- Drawer lip -->
  <line x1="3" y1="13" x2="25" y2="13" stroke="#3ECFB4" stroke-width="1" opacity="0.45"/>
  <!-- Drawer pull -->
  <rect x="12.5" y="19" width="3" height="1.6" rx="0.6" fill="#3ECFB4" opacity="0.55"/>

  <!-- Three index cards rising out of the box (center card tallest) -->
  <rect x="6" y="4" width="5" height="8" rx="0.8" stroke="#3ECFB4" stroke-width="1.3" fill="none" opacity="0.7"/>
  <line x1="7.2" y1="6.5" x2="9.8" y2="6.5" stroke="#3ECFB4" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <line x1="7.2" y1="8.5" x2="9.3" y2="8.5" stroke="#3ECFB4" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <rect x="11.5" y="2" width="5" height="10" rx="0.8" stroke="#3ECFB4" stroke-width="1.4" fill="none" opacity="0.95"/>
  <line x1="12.7" y1="5" x2="15.3" y2="5" stroke="#3ECFB4" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
  <line x1="12.7" y1="7" x2="14.8" y2="7" stroke="#3ECFB4" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <line x1="12.7" y1="9" x2="15" y2="9" stroke="#3ECFB4" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <rect x="17" y="5" width="5" height="7" rx="0.8" stroke="#3ECFB4" stroke-width="1.3" fill="none" opacity="0.7"/>
  <line x1="18.2" y1="7.5" x2="20.8" y2="7.5" stroke="#3ECFB4" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <line x1="18.2" y1="9.5" x2="20.3" y2="9.5" stroke="#3ECFB4" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
</svg>
