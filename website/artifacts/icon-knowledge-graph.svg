<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Three outer nodes in a triangle layout -->
  <circle cx="12" cy="5" r="2.6" fill="currentColor"/>
  <circle cx="5" cy="18.5" r="2.6" fill="currentColor"/>
  <circle cx="19" cy="18.5" r="2.6" fill="currentColor"/>
  <!-- Spokes connecting the three nodes (triangle edges) -->
  <line x1="12" y1="7.6" x2="5.7" y2="16.2"/>
  <line x1="12" y1="7.6" x2="18.3" y2="16.2"/>
  <line x1="7.4" y1="18.5" x2="16.6" y2="18.5"/>
</svg>
