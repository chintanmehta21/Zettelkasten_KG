<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Three outer nodes in a triangle -->
  <circle cx="12" cy="4.5" r="2"/>
  <circle cx="5" cy="18" r="2"/>
  <circle cx="19" cy="18" r="2"/>
  <!-- Central hub -->
  <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
  <!-- Spokes from hub to each outer node -->
  <line x1="12" y1="10.8" x2="12" y2="6.5"/>
  <line x1="11" y1="13" x2="6.6" y2="16.6"/>
  <line x1="13" y1="13" x2="17.4" y2="16.6"/>
</svg>
