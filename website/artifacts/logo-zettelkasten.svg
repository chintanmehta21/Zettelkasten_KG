<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Zettelkasten logo: A note/card with a link chain + spark -->
  <!-- Represents: summarize links → knowledge notes -->

  <!-- Card/note base -->
  <rect x="4" y="3" width="16" height="20" rx="2.5" stroke="#3ECFB4" stroke-width="1.6" fill="none" opacity="0.85"/>
  <!-- Folded corner -->
  <path d="M16 3 L20 7" stroke="#3ECFB4" stroke-width="1.4" opacity="0.5"/>
  <path d="M16 3 L16 7 L20 7" stroke="#3ECFB4" stroke-width="1.2" fill="none" opacity="0.35"/>

  <!-- Text lines on the card -->
  <line x1="7.5" y1="11" x2="16" y2="11" stroke="#3ECFB4" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="7.5" y1="14.5" x2="14" y2="14.5" stroke="#3ECFB4" stroke-width="1.3" stroke-linecap="round" opacity="0.4"/>
  <line x1="7.5" y1="18" x2="12" y2="18" stroke="#3ECFB4" stroke-width="1.3" stroke-linecap="round" opacity="0.3"/>

  <!-- Link/connection arc (the summarization idea) -->
  <path d="M20 15 C24 12, 26 16, 23 19" stroke="#3ECFB4" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <circle cx="23" cy="19" r="1.8" fill="#3ECFB4" opacity="0.8"/>

  <!-- Spark dot (AI/insight) -->
  <circle cx="21.5" cy="10" r="1.2" fill="#3ECFB4" opacity="0.9"/>
  <line x1="21.5" y1="7.5" x2="21.5" y2="8.5" stroke="#3ECFB4" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="23.5" y1="10" x2="24.5" y2="10" stroke="#3ECFB4" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="23" y1="8" x2="23.7" y2="8.7" stroke="#3ECFB4" stroke-width="0.7" stroke-linecap="round" opacity="0.45"/>
</svg>
