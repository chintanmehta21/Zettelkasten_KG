<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06060f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Knowledge Graph — Zettelkasten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/m/css/mobile.css">
</head>
<body class="kg-body">
  <!-- Header Overlay -->
  <header class="kg-m-header">
    <a class="m-back" href="/m/" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <input type="text" class="kg-m-search" id="search-input" placeholder="Search notes..." autocomplete="off">
    <button class="m-header-action" id="filter-toggle" aria-label="Toggle filters">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
    </button>
  </header>

  <!-- Stats Pill -->
  <div class="kg-m-stats" id="stats">Loading...</div>

  <!-- Graph Container (ForceGraph3D renders here) -->
  <div id="graph-container"></div>

  <!-- Filter Chips -->
  <div class="kg-m-filters" id="filter-chips">
    <button class="kg-m-chip active" data-source="youtube">
      <span class="kg-m-chip-dot" style="background:var(--node-youtube)"></span>YouTube
    </button>
    <button class="kg-m-chip active" data-source="reddit">
      <span class="kg-m-chip-dot" style="background:var(--node-reddit)"></span>Reddit
    </button>
    <button class="kg-m-chip active" data-source="github">
      <span class="kg-m-chip-dot" style="background:var(--node-github)"></span>GitHub
    </button>
    <button class="kg-m-chip active" data-source="substack">
      <span class="kg-m-chip-dot" style="background:var(--node-substack)"></span>Substack
    </button>
    <button class="kg-m-chip active" data-source="medium">
      <span class="kg-m-chip-dot" style="background:var(--node-medium)"></span>Medium
    </button>
    <button class="kg-m-chip active" data-source="web">
      <span class="kg-m-chip-dot" style="background:var(--node-web)"></span>Web
    </button>
  </div>

  <!-- Bottom Sheet -->
  <div class="kg-m-sheet" id="sheet">
    <div class="kg-m-sheet-handle"></div>
    <div class="kg-m-sheet-content">
      <span class="kg-m-sheet-badge" id="sheet-badge">source</span>
      <h2 class="kg-m-sheet-title" id="sheet-title">Note Title</h2>
      <p class="kg-m-sheet-date" id="sheet-date"></p>
      <p class="kg-m-sheet-summary" id="sheet-summary"></p>
      <div class="kg-m-sheet-tags" id="sheet-tags"></div>
      <div class="kg-m-sheet-connections" id="sheet-connections">
        <h3>Connected Notes</h3>
        <div id="sheet-conn-list"></div>
      </div>
      <a class="kg-m-sheet-link" id="sheet-link" href="#" target="_blank" rel="noopener">
        View Original Source
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three-spritetext@1.10.0/dist/three-spritetext.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.79.1/dist/3d-force-graph.min.js"></script>
  <script src="/m/js/graph.js"></script>
</body>
</html>
