<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zettelkasten Summarizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-text">Zettelkasten</span>
            </div>
            <p class="tagline">AI-powered link summarizer</p>
        </header>

        <!-- Input Section -->
        <main class="main">
            <div class="input-section" id="input-section">
                <h1 class="hero-text">Summarize any link</h1>
                <p class="hero-sub">Paste a URL from YouTube, GitHub, Reddit, newsletters, or any webpage</p>
                <form id="summarize-form" class="input-form">
                    <div class="input-wrapper">
                        <div class="source-dropdown" id="source-dropdown">
                            <button type="button" class="dropdown-toggle" id="dropdown-toggle">
                                <span class="dropdown-label" id="dropdown-label">Menu</span>
                                <span class="dropdown-chevron">&#9662;</span>
                            </button>
                            <ul class="dropdown-menu" id="dropdown-menu">
                                <li data-value="youtube" class="dropdown-item item-youtube">YouTube</li>
                                <li data-value="github" class="dropdown-item item-github">GitHub</li>
                                <li data-value="reddit" class="dropdown-item item-reddit">Reddit</li>
                                <li data-value="newsletter" class="dropdown-item item-newsletter">Newsletter</li>
                                <li data-value="generic" class="dropdown-item item-generic">Web</li>
                            </ul>
                        </div>
                        <input
                            type="url"
                            id="url-input"
                            placeholder="https://..."
                            autocomplete="off"
                            spellcheck="false"
                            required
                        >
                        <button type="submit" id="submit-btn">
                            <span class="btn-text">Summarize</span>
                            <span class="btn-icon">&rarr;</span>
                        </button>
                    </div>
                    <p class="error-message" id="error-message"></p>
                </form>
            </div>

            <!-- Loading State -->
            <div class="loading-section hidden" id="loading-section">
                <div class="loading-card">
                    <div class="spinner"></div>
                    <p class="loading-text" id="loading-text">Detecting source type...</p>
                    <p class="loading-url" id="loading-url"></p>
                </div>
            </div>

            <!-- Result Section -->
            <div class="result-section hidden" id="result-section">
                <div class="result-card">
                    <div class="result-header">
                        <span class="source-badge" id="result-source"></span>
                        <div class="result-meta">
                            <span class="meta-item" id="result-tokens"></span>
                            <span class="meta-item" id="result-latency"></span>
                        </div>
                    </div>

                    <h2 class="result-title" id="result-title"></h2>
                    <p class="result-oneliner" id="result-oneliner"></p>

                    <div class="result-tags" id="result-tags"></div>

                    <!-- Brief Summary -->
                    <div class="summary-section">
                        <div class="summary-header">
                            <h3>Key Takeaways</h3>
                        </div>
                        <div class="summary-content brief" id="result-brief"></div>
                    </div>

                    <!-- Detailed Summary -->
                    <div class="summary-section">
                        <div class="summary-header">
                            <h3>Detailed Summary</h3>
                            <button class="copy-btn" id="copy-btn" title="Copy summary">
                                <span class="copy-icon">&#x2398;</span>
                                <span class="copy-text">Copy</span>
                            </button>
                        </div>
                        <div class="summary-content detailed" id="result-detailed"></div>
                    </div>

                    <div class="result-footer">
                        <a class="source-link" id="result-link" href="#" target="_blank" rel="noopener">
                            View original &nearr;
                        </a>
                        <button class="try-another-btn" id="try-another-btn">Try another link</button>
                    </div>
                </div>
            </div>

            <!-- Error State -->
            <div class="error-section hidden" id="error-section">
                <div class="error-card">
                    <div class="error-icon">&#x26A0;</div>
                    <h3 class="error-title">Something went wrong</h3>
                    <p class="error-detail" id="error-detail"></p>
                    <button class="try-another-btn" id="error-retry-btn">Try again</button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <a href="https://github.com/chintanmehta21/zettelkasten-telegram-bot" target="_blank" rel="noopener" class="footer-github" title="View on GitHub">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
