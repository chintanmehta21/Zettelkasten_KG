# Zettelkasten Bot — nginx reverse proxy with TLS termination
# Replace the placeholders below before deploying:
#   YOUR_DOMAIN      — e.g. bot.example.com
#   YOUR_BOT_TOKEN   — Telegram bot token (must match TELEGRAM_BOT_TOKEN in .env)
#   /etc/letsencrypt paths are written by certbot automatically

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Telegram delivers webhook updates to /<bot-token>
    location /YOUR_BOT_TOKEN {
        proxy_pass         http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}
