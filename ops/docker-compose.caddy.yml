services:
  caddy:
    image: caddy:2
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    # Run as deploy:deploy (UID/GID 1000) so Caddy can write to
    # /var/log/caddy, /data, /config without needing CAP_DAC_OVERRIDE
    # (which is dropped by cap_drop: ALL below).
    user: "1000:1000"
    networks:
      - zettelnet
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /opt/zettelkasten/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/zettelkasten/caddy/upstream.snippet:/etc/caddy/upstream.snippet:ro
      - /opt/zettelkasten/caddy/data:/data
      - /opt/zettelkasten/caddy/config:/config
      - /opt/zettelkasten/logs/caddy:/var/log/caddy
    mem_limit: 128m
    pids_limit: 256
    stop_grace_period: 10s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "--no-check-certificate", "https://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  zettelnet:
    external: true
