services:
  zettelkasten-blue:
    image: ghcr.io/chintanmehta21/zettelkasten-kg-website:${IMAGE_TAG:-latest}
    container_name: zettelkasten-blue
    hostname: zettelkasten-blue
    restart: unless-stopped
    env_file:
      - /opt/zettelkasten/compose/.env
    environment:
      WEBHOOK_PORT: "10000"
      NEXUS_ENABLED: "true"
      # iter-03 §6: models are baked into the image read-only; runtime writes
      # go to /app/runtime via the mount below.
      RAG_DEGRADATION_LOG_DIR: "/app/runtime"
    ports:
      - "127.0.0.1:10000:10000"
    networks:
      - zettelnet
    volumes:
      - /opt/zettelkasten/data/kg_output:/app/kg_output
      - /opt/zettelkasten/data/bot_data:/app/bot_data
      # iter-03 §6: models live inside the image; runtime writes (e.g. the
      # cascade-reranker degradation log) go to a separate writable mount.
      - /opt/zettelkasten/data/runtime:/app/runtime:rw
    # iter-03 mem-bounded: cgroup ceiling 1600m + 1000m swap budget.
    # Original 1300m proved too tight under realistic q1 multi-hop load
    # (worker SIGKILL during stage-2 BGE int8 inference + Gemini retry
    # buffers). Bumped to 1600m 2026-04-28 with operator approval; iter-04
    # owns proper memory engineering (smaller stage1_k, batched encoding).
    # 2 GB droplet still leaves ~350 MB for caddy + system.
    mem_limit: 1600m
    memswap_limit: 2600m
    pids_limit: 512
    stop_grace_period: 20s
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "--max-time", "2", "http://127.0.0.1:10000/api/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  zettelnet:
    external: true
